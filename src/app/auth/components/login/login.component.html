@if(data$ | async; as data ){
<div class="auth-page">
    <div class="container page">
        <div class="row">
            <div class="col-md-6 offset-md-3 col-xs-12">
                <h1 class="text-xs-center">Sign In</h1>
                <p class="text-xs-center">
                    <a routerLink="/auth/register">Need an account?</a>
                </p>
                @if(data.backendErrors){
                <app-backend-error-messages [backendErrors]="{errors:data.backendErrors}"></app-backend-error-messages>
                }
                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                    <fieldset class="form-group">
                        <fieldset class="form-group">
                            <input formControlName="email" type="email" class="form-control form-control-lg"
                                placeholder="Email">
                        </fieldset>
                        <fieldset class="form-group">
                            <input formControlName="password" type="password" class="form-control form-control-lg"
                                placeholder="Password">
                        </fieldset>
                        <button type="submit" class="btn btn-lg btn-primary pull-xs-right">
                            Login
                        </button>
                    </fieldset>
                </form>
            </div>
        </div>
    </div>
</div>
}
