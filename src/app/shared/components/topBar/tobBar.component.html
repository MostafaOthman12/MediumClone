@if (data$ | async; as data) {
  <nav class="navbar navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" routerLink="/">Medium</a>
      <ul class="nav navbar-nav pull-xs-right">
        <li class="nav-item">
          <a class="nav-link" routerLink="/">Home</a>
        </li>
        @if (!data.currentUser) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/auth/login">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/auth/register">Register</a>
          </li>
        } @else {
          <li class="nav-item">
            <a class="nav-link" routerLink="/articles/new">
              <i class="ion-compose"></i>
              &nbsp; New Article</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/settings', data.currentUser]">
              <i class="ion-gear-a"></i>
              &nbsp; Settings</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/profile', data.currentUser]">
              <img class="user-pic" [src]="data.currentUser.image" />
              {{ data.currentUser.username }}
            </a>
          </li>
        }
      </ul>
    </div>
  </nav>
}
